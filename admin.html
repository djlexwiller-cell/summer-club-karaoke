<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BileKaraoke Admin</title>

<style>
:root{
  color-scheme:dark;
  --bg:#0b0b0f;
  --header:#15151b;
  --panel:#1c1c24;
  --panel-strong:#252530;
  --text:#ffffff;
  --muted:#b8b8c6;
  --soft:#7f7f91;
  --accent:#ff2f8f;
  --blue:#2563eb;
  --yellow:#ca8a04;
  --green:#16803c;
  --red:#a91e2c;
  --border:rgba(255,255,255,0.12);
}

*{
  box-sizing:border-box;
}

body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:Arial, Helvetica, sans-serif;
}

button{
  min-height:44px;
  border:0;
  border-radius:8px;
  padding:11px 15px;
  color:white;
  font:inherit;
  font-weight:800;
  cursor:pointer;
  transition:opacity 0.16s ease, transform 0.16s ease, filter 0.16s ease;
}

button:hover{
  filter:brightness(1.08);
  transform:translateY(-1px);
}

button:disabled{
  cursor:not-allowed;
  opacity:0.55;
  transform:none;
}

.container{
  width:min(1120px,100%);
  margin:0 auto;
  padding:0 18px;
}

.header{
  position:sticky;
  top:0;
  z-index:10;
  border-bottom:1px solid var(--border);
  background:rgba(21,21,27,0.96);
  backdrop-filter:blur(12px);
}

.header-inner{
  padding:18px 0;
}

h1{
  margin:0;
  font-size:28px;
  line-height:1.1;
}

.subtitle{
  margin-top:6px;
  color:var(--muted);
}

.controls{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  margin-top:16px;
}

.btn-blue{
  background:var(--blue);
}

.btn-red{
  background:var(--red);
}

.btn-yellow{
  background:var(--yellow);
}

.btn-green{
  background:var(--green);
}

.btn-gray{
  background:#4b4b57;
}

.pin-box{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:16px;
  margin-top:16px;
  padding:14px 16px;
  border:1px solid var(--border);
  border-radius:8px;
  background:var(--panel);
}

.pin-title{
  color:var(--muted);
  font-size:14px;
  font-weight:800;
}

.pin-value{
  color:#7dff9c;
  font-size:30px;
  font-weight:900;
  letter-spacing:3px;
}

.request-feed{
  padding:22px 0 34px;
}

.request-card{
  margin-bottom:14px;
  padding:17px;
  border:1px solid var(--border);
  border-left:5px solid var(--accent);
  border-radius:8px;
  background:var(--panel);
}

.request-top{
  display:flex;
  justify-content:space-between;
  gap:18px;
}

.song{
  font-size:23px;
  font-weight:900;
}

.artist{
  margin-top:5px;
  color:var(--muted);
}

.timestamp{
  color:var(--soft);
  font-size:13px;
  text-align:right;
  white-space:nowrap;
}

.request-name{
  margin-top:14px;
  color:#7dff9c;
  font-weight:800;
}

.request-message{
  margin-top:12px;
  padding:12px;
  border-radius:8px;
  background:var(--panel-strong);
  color:#e4e4ea;
  line-height:1.45;
}

.status-buttons{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  margin-top:15px;
}

.status-btn{
  opacity:0.55;
}

.status-btn.active{
  opacity:1;
  transform:scale(1.02);
  outline:2px solid rgba(255,255,255,0.24);
}

.empty{
  margin-top:50px;
  color:var(--soft);
  text-align:center;
}

@media (max-width:700px){
  .pin-box,
  .request-top{
    align-items:flex-start;
    flex-direction:column;
  }

  .timestamp{
    text-align:left;
    white-space:normal;
  }

  .status-buttons button,
  .controls button{
    flex:1 1 160px;
  }

  .song{
    font-size:20px;
  }
}
</style>
</head>

<body>
<header class="header">
  <div class="container header-inner">
    <h1>DJ Lex Willer Admin</h1>
    <div class="subtitle">Summer Club • Live Requests Dashboard</div>

    <div class="controls">
      <button type="button" id="messageToggleButton" class="btn-blue" onclick="toggleMessages()">DJ Messages: ON</button>
      <button type="button" class="btn-blue" onclick="loadAll()">Päivitä jono</button>
      <button type="button" class="btn-red" onclick="endNight()">Päätä ilta</button>
    </div>

    <div class="pin-box">
      <div class="pin-title">Illan PIN</div>
      <div class="pin-value" id="currentPin">Ladataan...</div>
    </div>
  </div>
</header>

<main class="container">
  <div class="request-feed" id="requestFeed">
    <div class="empty">Ladataan toiveita...</div>
  </div>
</main>

<script>
const SHEET_URL =
  "https://docs.google.com/spreadsheets/d/1ShQaz600hsbEMrDqYThFln7rs34lu4LlnEUH4C3Q6t4/export?format=tsv";

const PIN_URL =
  "https://docs.google.com/spreadsheets/d/1ShQaz600hsbEMrDqYThFln7rs34lu4LlnEUH4C3Q6t4/export?format=csv&gid=1989187739";

const MESSAGE_SETTINGS_URL =
  "https://docs.google.com/spreadsheets/d/1ShQaz600hsbEMrDqYThFln7rs34lu4LlnEUH4C3Q6t4/export?format=csv&gid=1934620115";

const APPS_SCRIPT_URL =
  "https://script.google.com/macros/s/AKfycbwMNRhRnPH7M7ca4_nruQg4pYpekx_j0MlpAKJ-jgjhoOEtxCg8ar4xkLJ4A1c2rB4zaQ/exec";

const ADMIN_SECRET = "LEXWILLER2025";
const requestFeed = document.getElementById("requestFeed");

let messagesEnabled = true;

function escapeHtml(value = ""){
  return String(value)
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;")
    .replace(/'/g,"&#039;");
}

function cleanCell(value = ""){
  return String(value).replace(/"/g,"").replace(/\r/g,"").trim();
}

function parseCsvFirstRow(text){
  return (text.split("\n")[0] || "").split(",").map(cleanCell);
}

async function postAdminAction(payload){
  await fetch(APPS_SCRIPT_URL, {
    method:"POST",
    mode:"no-cors",
    body:JSON.stringify({
      ...payload,
      secret:ADMIN_SECRET
    })
  });
}

async function loadPin(){
  try{
    const response = await fetch(PIN_URL);
    const text = await response.text();
    const pin = cleanCell(text.split("\n")[0] || "");

    document.getElementById("currentPin").innerText = pin || "Ei PIN-koodia";
  }catch(err){
    console.error(err);
    document.getElementById("currentPin").innerText = "Virhe";
  }
}

async function loadRequests(){
  try{
    const response = await fetch(SHEET_URL);
    const tsv = await response.text();
    const rows = tsv.split("\n").slice(1).filter(row => row.trim() !== "");

    requestFeed.innerHTML = "";

    rows.forEach((row,index) => {
      const actualRow = index + 2;
      const cols = row.split("\t");

      const timestamp = cleanCell(cols[0]);
      const name = cleanCell(cols[1] || "Tuntematon");
      const artist = cleanCell(cols[2]);
      const song = cleanCell(cols[3]);
      const message = cleanCell(cols[4]);
      const status = cleanCell(cols[5] || "Jonossa");

      if(status === "Piilotettu"){
        return;
      }

      const titleHtml = song || artist
        ? `
          <div class="song">${escapeHtml(song)}</div>
          ${artist ? `<div class="artist">${escapeHtml(artist)}</div>` : ""}
        `
        : "";

      const card = document.createElement("article");
      card.className = "request-card";
      card.innerHTML = `
        <div class="request-top">
          <div>
            ${titleHtml}
          </div>
          <div class="timestamp">${escapeHtml(timestamp)}</div>
        </div>

        <div class="request-name">${escapeHtml(name)}</div>
        <div class="request-message">${escapeHtml(message || "Ei viestiä")}</div>

        <div class="status-buttons">
          <button type="button" class="status-btn btn-yellow ${status === "Jonossa" ? "active" : ""}" onclick="setStatus(this,'Jonossa',${actualRow})">Jonossa</button>
          <button type="button" class="status-btn btn-green ${status === "Soitettu" ? "active" : ""}" onclick="setStatus(this,'Soitettu',${actualRow})">Soitettu</button>
          <button type="button" class="status-btn btn-red ${status === "Skipattu" ? "active" : ""}" onclick="setStatus(this,'Skipattu',${actualRow})">Skipattu</button>
          <button type="button" class="status-btn btn-gray" onclick="hideMessage(this,${actualRow})">Piilota</button>
        </div>
      `;

      requestFeed.appendChild(card);
    });

    if(!requestFeed.children.length){
      requestFeed.innerHTML = '<div class="empty">Jonossa ei ole näkyviä toiveita.</div>';
    }
  }catch(err){
    console.error(err);
    requestFeed.innerHTML = '<div class="empty">Toiveiden lataus epäonnistui.</div>';
  }
}

function updateToggleButton(){
  const button = document.getElementById("messageToggleButton");
  button.innerText = messagesEnabled ? "DJ Messages: ON" : "DJ Messages: OFF";
  button.className = messagesEnabled ? "btn-blue" : "btn-gray";
}

async function loadMessageToggle(){
  try{
    const response = await fetch(MESSAGE_SETTINGS_URL);
    const text = await response.text();
    const cols = parseCsvFirstRow(text);
    messagesEnabled = (cols[1] || "ON").toUpperCase() === "ON";
    updateToggleButton();
  }catch(err){
    console.error(err);
  }
}

async function toggleMessages(){
  messagesEnabled = !messagesEnabled;
  updateToggleButton();

  try{
    await postAdminAction({
      action:"toggleMessages",
      value:messagesEnabled ? "ON" : "OFF"
    });
  }catch(err){
    console.error(err);
    alert("Message toggle epäonnistui.");
    messagesEnabled = !messagesEnabled;
    updateToggleButton();
  }
}

async function setStatus(button,status,row){
  const buttons = button.parentElement.querySelectorAll(".status-btn");
  buttons.forEach(btn => btn.classList.remove("active"));
  button.classList.add("active");

  try{
    await postAdminAction({
      action:"status",
      row,
      status
    });
  }catch(err){
    console.error(err);
    alert("Statuksen päivitys epäonnistui.");
  }
}

async function hideMessage(button,row){
  if(!confirm("Piilotetaanko tämä viesti feedistä?")){
    return;
  }

  const card = button.closest(".request-card");

  if(card){
    card.style.transition = "0.25s";
    card.style.opacity = "0";
    card.style.transform = "scale(0.98)";
    setTimeout(() => card.remove(),250);
  }

  try{
    await postAdminAction({
      action:"status",
      row,
      status:"Piilotettu"
    });
  }catch(err){
    console.error(err);
    alert("Piilotus epäonnistui.");
    loadRequests();
  }
}

async function endNight(){
  if(!confirm("Arkistoidaanko kaikki requestit ja tyhjennetäänkö queue?")){
    return;
  }

  try{
    await postAdminAction({
      action:"archive"
    });

    alert("Queue arkistoitu onnistuneesti.");
    setTimeout(loadAll,1500);
  }catch(err){
    console.error(err);
    alert("Archivointi epäonnistui.");
  }
}

async function loadAll(){
  await Promise.all([
    loadPin(),
    loadMessageToggle(),
    loadRequests()
  ]);
}

loadAll();
setInterval(loadAll,15000);
</script>
</body>
</html>
