<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>DJ Lex Willer Admin</title>

<style>

body{
  margin:0;
  background:#0f0f0f;
  color:white;
  font-family:Arial,sans-serif;
}

.header{
  background:#161616;
  padding:16px 20px;
  border-bottom:1px solid #2a2a2a;
  position:sticky;
  top:0;
  z-index:999;
}

.container{
  max-width:1100px;
  margin:auto;
}

h1{
  margin:0;
  font-size:28px;
}

.subtitle{
  color:#999;
  margin-top:4px;
}

.controls{
  margin-top:15px;
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

button{
  border:none;
  border-radius:12px;
  padding:12px 16px;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

.refresh{
  background:#2563eb;
}

.refresh:hover{
  background:#1d4ed8;
}

.request-feed{
  padding:20px;
}

.request-card{
  background:#1a1a1a;
  border-radius:18px;
  padding:18px;
  margin-bottom:16px;
  border-left:5px solid #ff0088;
  touch-action:manipulation;
}

.request-top{
  display:flex;
  justify-content:space-between;
  gap:20px;
  flex-wrap:wrap;
}

.song{
  font-size:24px;
  font-weight:bold;
}

.artist{
  margin-top:4px;
  color:#aaa;
}

.request-name{
  margin-top:14px;
  color:#7dff9c;
  font-weight:bold;
}

.request-message{
  margin-top:12px;
  background:#252525;
  padding:12px;
  border-radius:12px;
  color:#ddd;
}

.timestamp{
  color:#777;
  font-size:13px;
}

.status-buttons{
  margin-top:16px;
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.status-btn{
  opacity:0.4;
  transition:0.2s;
}

.status-btn.active{
  opacity:1;
  transform:scale(1.03);
}

.queue-btn{
  background:#ca8a04;
}

.played-btn{
  background:#15803d;
}

.skip-btn{
  background:#991b1b;
}

.dragging{
  opacity:0.5;
}

.empty{
  text-align:center;
  color:#666;
  margin-top:50px;
}

@media(max-width:768px){

  .song{
    font-size:20px;
  }

  button{
    width:100%;
  }

  .status-buttons button{
    width:auto;
    flex:1;
  }
}

</style>
</head>
<body>

<div class="header">
  <div class="container">

    <h1>🎧 DJ LEX WILLER ADMIN</h1>

    <div class="subtitle">
      Summer Club • Live Requests Dashboard
    </div>

    <div class="controls">
      <button class="refresh" onclick="loadRequests()">
        🔄 Refresh Queue
      </button>
    </div>

  </div>
</div>

<div class="container">

  <div class="request-feed" id="requestFeed">

    <div class="empty">
      Loading requests...
    </div>

  </div>

</div>

<script>

// ========================================
// PASTE GOOGLE SHEET CSV URL HERE
// ========================================

const SHEET_CSV_URL =
"https://docs.google.com/spreadsheets/d/1ShQaz600hsbEMrDqYThFln7rs34lu4LlnEUH4C3Q6t4/export?format=csv;"

// ========================================

const requestFeed = document.getElementById("requestFeed");

async function loadRequests(){

  try{

    const response = await fetch(SHEET_CSV_URL);

    const csv = await response.text();

    const rows = csv
      .split("\n")
      .slice(1)
      .filter(row => row.trim() !== "");

    requestFeed.innerHTML = "";

    rows.forEach((row,index)=>{

      const cols = row.split(",");

      const timestamp = cols[0] || "";
      const name = cols[1] || "Tuntematon";
      const artist = cols[2] || "";
      const song = cols[3] || "";
      const message = cols[4] || "";
      const status = cols[5] || "Jonossa";

      const card = document.createElement("div");

      card.className = "request-card";

      card.draggable = true;

      card.innerHTML = `

        <div class="request-top">

          <div>
            <div class="song">🎵 ${song}</div>
            <div class="artist">${artist}</div>
          </div>

          <div class="timestamp">
            ${timestamp}
          </div>

        </div>

        <div class="request-name">
          👤 ${name}
        </div>

        <div class="request-message">
          📣 ${message || "Ei viestiä"}
        </div>

        <div class="status-buttons">

          <button
            class="status-btn queue-btn ${status.includes("Jonossa") ? "active" : ""}"
            onclick="setStatus(this,'Jonossa')">
            🟡 Jonossa
          </button>

          <button
            class="status-btn played-btn ${status.includes("Soitettu") ? "active" : ""}"
            onclick="setStatus(this,'Soitettu')">
            ✅ Soitettu
          </button>

          <button
            class="status-btn skip-btn ${status.includes("Skipattu") ? "active" : ""}"
            onclick="setStatus(this,'Skipattu')">
            ⛔ Skipattu
          </button>

        </div>

      `;

      addDragEvents(card);

      requestFeed.appendChild(card);

    });

  }catch(err){

    console.log(err);

    requestFeed.innerHTML = `
      <div class="empty">
        ❌ Requestien lataus epäonnistui
      </div>
    `;
  }
}

function setStatus(button,status){

  const buttons = button.parentElement.querySelectorAll(".status-btn");

  buttons.forEach(btn=>{
    btn.classList.remove("active");
  });

  button.classList.add("active");
}

let draggedItem = null;

function addDragEvents(card){

  card.addEventListener("dragstart",()=>{

    draggedItem = card;

    card.classList.add("dragging");
  });

  card.addEventListener("dragend",()=>{

    card.classList.remove("dragging");
  });

  card.addEventListener("dragover",(e)=>{

    e.preventDefault();

    const afterElement = getDragAfterElement(requestFeed,e.clientY);

    if(afterElement == null){

      requestFeed.appendChild(draggedItem);

    }else{

      requestFeed.insertBefore(draggedItem,afterElement);
    }
  });
}

function getDragAfterElement(container,y){

  const draggableElements = [...container.querySelectorAll('.request-card:not(.dragging)')];

  return draggableElements.reduce((closest,child)=>{

    const box = child.getBoundingClientRect();

    const offset = y - box.top - box.height / 2;

    if(offset < 0 && offset > closest.offset){

      return {
        offset: offset,
        element: child
      };

    }else{

      return closest;
    }

  },{
    offset:Number.NEGATIVE_INFINITY
  }).element;
}

loadRequests();

setInterval(()=>{

  loadRequests();

},15000);

</script>

</body>
</html>
