Korvaa nykyinen `admin.html` tällä versiolla.

```html
<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>DJ Lex Willer Admin V3</title>

<style>

body{
  margin:0;
  background:#0f0f0f;

  font-family:Arial,sans-serif;

</head>
<body>

<div class="header">
  <div class="container">

    <h1>🎧 DJ LEX WILLER ADMIN</h1>

    <div class="subtitle">
      Summer Club • Live Requests Dashboard
    </div>

    <div class="controls">

      <button class="refresh" onclick="loadRequests()">
        🔄 Refresh Queue
      </button>

      <button class="endnight" onclick="endNight()">
        🧹 End Night
      </button>

    </div>

    <div class="pin-box">

      <div class="pin-title">
        🎟️ Tonight's PIN
      </div>

      <div class="pin-value" id="currentPin">
        LOADING...
      </div>

    </div>

  </div>
</div>

<div class="container">

  <div class="request-feed" id="requestFeed">

    <div class="empty">
      Loading requests...
    </div>

  </div>

</div>

<script>

const SHEET_URL =
"PASTE_TSV_URL_HERE";

const PIN_URL =
"PASTE_PIN_URL_HERE";

const APPS_SCRIPT_URL =
"PASTE_APPS_SCRIPT_URL_HERE";

const requestFeed =
  document.getElementById("requestFeed");

function sanitize(str=""){

  return str
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/\"/g,"&quot;")
    .replace(/'/g,"&#039;");
}

async function loadPin(){

  try{

    const response =
      await fetch(PIN_URL);

    const text =
      await response.text();

    const rows =
      text.split("\n");

    if(rows[0]){

      const pin =
        rows[0]
          .replace(/\"/g,"")
          .trim();

      document
        .getElementById("currentPin")
        .innerText = pin;
    }

  }catch(err){

    console.log(err);
  }
}

async function loadRequests(){

  try{

    const response =
      await fetch(SHEET_URL);

    const tsv =
      await response.text();

    const rows = tsv
      .split("\n")
      .slice(1)
      .filter(row => row.trim() !== "");

    requestFeed.innerHTML = "";

    rows.forEach((row,index)=>{

      const actualRow = index + 2;

      const cols = row.split("\t");

      const timestamp =
        (cols[0] || "")
          .replace(/\"/g,"")
          .trim();

      const name =
        (cols[1] || "Tuntematon")
          .replace(/\"/g,"")
          .trim();

      const artist =
        (cols[2] || "")
          .replace(/\"/g,"")
          .trim();

      const song =
        (cols[3] || "")
          .replace(/\"/g,"")
          .trim();

      const message =
        (cols[4] || "")
          .replace(/\"/g,"")
          .trim();

      const status =
        (cols[5] || "Jonossa")
          .replace(/\"/g,"")
          .replace(/\r/g,"")
          .trim();

      if(status === "Piilotettu"){
        return;
      }

      const card =
        document.createElement("div");

      card.className = "request-card";

      card.innerHTML = `

        <div class="request-top">

          <div>
            <div class="song">
              🎵 ${sanitize(song)}
            </div>

            <div class="artist">
              ${sanitize(artist)}
            </div>
          </div>

          <div class="timestamp">
            ${timestamp}
          </div>

        </div>

        <div class="request-name">
          👤 ${sanitize(name)}
        </div>

        <div class="request-message">
          📣 ${sanitize(message || "Ei viestiä")}
        </div>

        <div class="status-buttons">

          <button
            class="status-btn queue-btn ${status === "Jonossa" ? "active" : ""}"
            onclick="setStatus(this,'Jonossa',${actualRow})"
          >
            🟡 Jonossa
          </button>

          <button
            class="status-btn played-btn ${status === "Soitettu" ? "active" : ""}"
            onclick="setStatus(this,'Soitettu',${actualRow})"
          >
            ✅ Soitettu
          </button>

          <button
            class="status-btn skip-btn ${status === "Skipattu" ? "active" : ""}"
            onclick="setStatus(this,'Skipattu',${actualRow})"
          >
            ⛔ Skipattu
          </button>

          <button
            class="status-btn hide-btn"
            onclick="hideMessage(this,${actualRow})"
          >
            🗑️ Piilota
          </button>

        </div>

      `;

      requestFeed.appendChild(card);

    });

  }catch(err){

    console.log(err);

    requestFeed.innerHTML = `
      <div class="empty">
        ❌ Requestien lataus epäonnistui
      </div>
    `;
  }
}

async function setStatus(button,status,row){

  const buttons =
    button.parentElement.querySelectorAll(".status-btn");

  buttons.forEach(btn=>{
    btn.classList.remove("active");
  });

  button.classList.add("active");

  try{

    await fetch(APPS_SCRIPT_URL, {

      method:"POST",

      mode:"no-cors",

      body: JSON.stringify({

        action:"status",

        secret:"LEXWILLER2025",

        row:row,

        status:status

      })

    });

  }catch(err){

    console.log(err);
  }
}

async function hideMessage(button,row){

  const confirmHide = confirm(
    "Piilotetaanko tämä viesti feedistä?"
  );

  if(!confirmHide){
    return;
  }

  const card =
    button.closest(".request-card");

  if(card){

    card.style.transition = "0.25s";
    card.style.opacity = "0";
    card.style.transform = "scale(0.95)";

    setTimeout(()=>{
      card.remove();
    },250);
  }

  try{

    await fetch(APPS_SCRIPT_URL, {

      method:"POST",

      mode:"no-cors",

      body: JSON.stringify({

        action:"status",

        secret:"LEXWILLER2025",

        row:row,

        status:"Piilotettu"

      })

    });

  }catch(err){

    console.log(err);
  }
}

async function endNight(){

  const confirmAction = confirm(
    "Arkistoidaanko kaikki requestit ja tyhjennetään queue?"
  );

  if(!confirmAction){
    return;
  }

  try{

    await fetch(APPS_SCRIPT_URL, {

      method:"POST",

      mode:"no-cors",

      body: JSON.stringify({

        action:"archive",

        secret:"LEXWILLER2025"

      })

    });

    alert("🧹 Queue arkistoitu onnistuneesti");

    setTimeout(()=>{

      loadPin();
      loadRequests();

    },1500);

  }catch(err){

    console.log(err);

    alert("❌ Archivointi epäonnistui");
  }
}

loadPin();
loadRequests();

setInterval(()=>{

  loadPin();
  loadRequests();

},15000);

</script>
</body>
</html>
