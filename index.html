<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BileKaraoke</title>

<style>
:root{
  color-scheme:dark;
  --bg:#09090b;
  --panel:#17171c;
  --panel-strong:#202028;
  --text:#ffffff;
  --muted:#b6b6c2;
  --soft:#777787;
  --accent:#ff2f8f;
  --accent-strong:#ff5aa7;
  --ok:#67e88b;
  --danger:#ff6b6b;
  --border:rgba(255,255,255,0.12);
  --shadow:0 18px 60px rgba(0,0,0,0.42);
}

*{
  box-sizing:border-box;
}

html,
body{
  min-height:100%;
  margin:0;
  overflow-x:hidden;
}

body{
  color:var(--text);
  font-family:Arial, Helvetica, sans-serif;
  background:
    linear-gradient(rgba(0,0,0,0.58),rgba(0,0,0,0.78)),
    url("https://images.unsplash.com/photo-1507525428034-b723cf961d3e?q=80&w=1920&auto=format&fit=crop");
  background-size:cover;
  background-position:center;
  background-attachment:fixed;
}

button,
input,
textarea{
  font:inherit;
}

button{
  min-height:54px;
  border:0;
  border-radius:8px;
  padding:14px 18px;
  color:var(--text);
  background:var(--accent);
  font-weight:800;
  cursor:pointer;
  transition:transform 0.16s ease, background 0.16s ease, opacity 0.16s ease;
}

button:hover{
  background:var(--accent-strong);
  transform:translateY(-1px);
}

button:disabled{
  cursor:not-allowed;
  opacity:0.55;
  transform:none;
}

input,
textarea{
  width:100%;
  border:1px solid var(--border);
  border-radius:8px;
  background:rgba(17,17,22,0.94);
  color:var(--text);
  padding:15px 16px;
  font-size:16px;
  outline:none;
}

input:focus,
textarea:focus{
  border-color:rgba(255,47,143,0.8);
  box-shadow:0 0 0 3px rgba(255,47,143,0.16);
}

textarea{
  min-height:118px;
  resize:vertical;
}

.app{
  width:min(820px,100%);
  margin:0 auto;
  padding:24px 16px 44px;
}

.brand{
  padding:18px 0 24px;
}

.brand h1,
.screen h1{
  margin:0;
  font-size:clamp(31px,6vw,50px);
  line-height:1.02;
}

.lead{
  margin:12px 0 0;
  color:var(--muted);
  font-size:18px;
  line-height:1.45;
}

.screen{
  display:none;
}

.screen.active{
  display:block;
}

.actions{
  display:grid;
  gap:12px;
  margin-top:22px;
}

.secondary{
  background:var(--panel-strong);
}

.secondary:hover{
  background:#2a2a34;
}

.back{
  width:auto;
  min-height:44px;
  margin-bottom:22px;
  padding:10px 14px;
  background:rgba(32,32,40,0.92);
}

.field{
  margin-top:20px;
}

.field label{
  display:block;
  margin-bottom:9px;
  color:var(--muted);
  font-weight:800;
}

.song-list{
  max-height:64vh;
  margin-top:18px;
  padding-right:4px;
  overflow:auto;
  scrollbar-width:none;
}

.song-list::-webkit-scrollbar{
  display:none;
}

.song-card,
.selected-song,
.notice{
  border:1px solid var(--border);
  border-radius:8px;
  background:rgba(23,23,28,0.94);
  box-shadow:var(--shadow);
}

.song-card{
  width:100%;
  margin:0 0 10px;
  padding:15px 16px;
  text-align:left;
  color:var(--text);
}

.song-card:hover{
  background:rgba(33,33,42,0.96);
}

.song-title{
  font-size:18px;
  font-weight:800;
}

.song-artist{
  margin-top:5px;
  color:var(--muted);
}

.selected-song{
  margin:8px 0 22px;
  padding:16px;
}

.selected-song strong{
  display:block;
  margin-bottom:8px;
}

.success{
  display:none;
  margin-top:18px;
  padding:14px 16px;
  border-radius:8px;
  background:rgba(61,170,91,0.18);
  color:var(--ok);
  font-weight:800;
}

.notice{
  margin-top:18px;
  padding:16px;
  color:var(--muted);
}

.footer{
  margin-top:40px;
  color:var(--soft);
  text-align:center;
}

.pin-screen{
  position:fixed;
  inset:0;
  z-index:20;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:22px;
  background:
    linear-gradient(rgba(0,0,0,0.72),rgba(0,0,0,0.9)),
    url("https://images.unsplash.com/photo-1533174072545-7a4b6ad7a6c3?q=80&w=1600&auto=format&fit=crop");
  background-size:cover;
  background-position:center;
}

.pin-panel{
  width:min(420px,100%);
  padding:24px;
  border:1px solid var(--border);
  border-radius:8px;
  background:rgba(12,12,16,0.92);
  box-shadow:var(--shadow);
}

.pin-panel h1{
  margin:0 0 12px;
  font-size:30px;
}

.pin-panel p{
  margin:0 0 18px;
  color:var(--muted);
  line-height:1.45;
}

.pin-panel button{
  width:100%;
  margin-top:12px;
}

@media (max-width:560px){
  .app{
    padding-top:16px;
  }

  .brand h1,
  .screen h1{
    font-size:34px;
  }

  button{
    width:100%;
  }
}
</style>
</head>

<body>
<div id="pinScreen" class="pin-screen">
  <div class="pin-panel">
    <h1>Syötä illan bilekoodi</h1>
    <p>Koodi vaihtuu tapahtuman mukaan. Kysy se DJ:ltä tai henkilökunnalta.</p>
    <input id="pinInput" type="text" placeholder="Esim. CLUB42" autocomplete="off" />
    <button type="button" onclick="checkPin()">Avaa bilekaraoke</button>
  </div>
</div>

<main class="app">
  <header class="brand">
    <h1>BileKaraoke</h1>
    <p class="lead">Valitse biisi, lähetä toive jonoon tai vinkkaa DJ:lle puuttuva kappale.</p>
  </header>

  <section id="homeScreen" class="screen active">
    <div class="actions">
      <button type="button" onclick="openScreen('songScreen')">Lisää biisitoive jonoon</button>
      <button type="button" class="secondary" onclick="openScreen('suggestionScreen')">Ehdota puuttuvaa kappaletta</button>
      <button type="button" class="secondary" id="messageScreenButton" onclick="openScreen('messageScreen')">Lähetä DJ:lle viesti</button>
    </div>
  </section>

  <section id="songScreen" class="screen">
    <button type="button" class="back" onclick="goHome()">Takaisin</button>
    <h1>Mitä lauletaan?</h1>
    <div class="field">
      <label for="search">Hae artistia tai kappaletta</label>
      <input type="text" id="search" placeholder="Kirjoita hakusana..." autocomplete="off" />
    </div>
    <div id="songs" class="song-list"></div>
  </section>

  <section id="requestScreen" class="screen">
    <button type="button" class="back" onclick="backToSongs()">Vaihda biisi</button>
    <div id="selectedSong" class="selected-song"></div>
    <div class="field">
      <label for="name">Oma nimi</label>
      <input type="text" id="name" placeholder="Kirjoita nimesi..." autocomplete="name" />
    </div>
    <div class="field">
      <label for="message">Terveiset DJ:lle</label>
      <textarea id="message" placeholder="Shoutoutit, synttärit, terveiset..."></textarea>
    </div>
    <button type="button" onclick="sendRequest(event)">Lähetä biisitoive DJ:lle</button>
    <div class="success" id="successBox">Biisitoive lähetetty!</div>
  </section>

  <section id="suggestionScreen" class="screen">
    <button type="button" class="back" onclick="goHome()">Takaisin</button>
    <h1>Ehdota biisiä</h1>
    <div class="field">
      <label for="suggestArtist">Artisti</label>
      <input type="text" id="suggestArtist" placeholder="Artisti" />
    </div>
    <div class="field">
      <label for="suggestSong">Kappale</label>
      <input type="text" id="suggestSong" placeholder="Kappale" />
    </div>
    <div class="field">
      <label for="suggestMessage">Lisätieto</label>
      <textarea id="suggestMessage" placeholder="Miksi tämä pitäisi lisätä listoille?"></textarea>
    </div>
    <button type="button" onclick="sendSuggestion(event)">Lähetä ehdotus</button>
  </section>

  <section id="messageScreen" class="screen">
    <button type="button" class="back" onclick="goHome()">Takaisin</button>
    <h1>Lähetä DJ:lle viesti</h1>
    <div class="field">
      <label for="djMessageName">Nimi</label>
      <input type="text" id="djMessageName" placeholder="Nimi, vapaaehtoinen" />
    </div>
    <div class="field">
      <label for="djMessageText">Viesti</label>
      <textarea id="djMessageText" placeholder="Kirjoita viesti DJ:lle..."></textarea>
    </div>
    <button type="button" onclick="sendDJMessage(event)">Lähetä viesti</button>
  </section>

  <footer class="footer">BileKaraoke • Lex Willer</footer>
</main>

<script src="songs.js"></script>
<script>
const WEBHOOK_URL =
  "https://script.google.com/macros/s/AKfycbwMNRhRnPH7M7ca4_nruQg4pYpekx_j0MlpAKJ-jgjhoOEtxCg8ar4xkLJ4A1c2rB4zaQ/exec";

const PIN_CSV_URL =
  "https://docs.google.com/spreadsheets/d/1ShQaz600hsbEMrDqYThFln7rs34lu4LlnEUH4C3Q6t4/export?format=csv&gid=1989187739";

const MESSAGE_SETTINGS_URL =
  "https://docs.google.com/spreadsheets/d/1ShQaz600hsbEMrDqYThFln7rs34lu4LlnEUH4C3Q6t4/export?format=csv&gid=1934620115";

// Direct Google Apps Script calls usually need this as false.
// Set true if WEBHOOK_URL points to a CORS-capable proxy, for example Cloudflare Worker.
const API_USES_READABLE_JSON = false;

const COOLDOWN_SECONDS = 30;

const songsDiv = document.getElementById("songs");
const searchInput = document.getElementById("search");

let selectedSong = null;
let currentPin = "";
let savedScrollPosition = 0;

function escapeHtml(value = ""){
  return String(value)
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;")
    .replace(/'/g,"&#039;");
}

function hideAllScreens(){
  document.querySelectorAll(".screen").forEach(screen => {
    screen.classList.remove("active");
  });
}

function openScreen(screenId){
  hideAllScreens();
  document.getElementById(screenId).classList.add("active");
  window.scrollTo({ top:0, behavior:"smooth" });
}

function clearForms(){
  ["name","message","search","suggestArtist","suggestSong","suggestMessage","djMessageName","djMessageText"].forEach(id => {
    const field = document.getElementById(id);
    if(field){
      field.value = "";
    }
  });
}

function goHome(){
  clearForms();
  selectedSong = null;
  document.getElementById("selectedSong").innerHTML = "";
  renderSongs("");
  openScreen("homeScreen");
}

function backToSongs(){
  openScreen("songScreen");
  setTimeout(() => {
    songsDiv.scrollTop = savedScrollPosition;
  },50);
}

function getSongData(){
  if(typeof songs !== "undefined" && Array.isArray(songs)){
    return songs;
  }

  return Array.isArray(window.songs) ? window.songs : [];
}

function renderSongs(filter = ""){
  const songData = getSongData();
  const query = filter.trim().toLowerCase();

  songsDiv.innerHTML = "";

  if(songData.length === 0){
    songsDiv.innerHTML = '<div class="notice">Biisilistaa ei ole vielä ladattu.</div>';
    return;
  }

  const filtered = songData
    .filter(item => {
      const artist = String(item.artist || "").toLowerCase();
      const song = String(item.song || "").toLowerCase();
      return artist.includes(query) || song.includes(query);
    })
    .sort((a,b) => String(a.artist || "").localeCompare(String(b.artist || ""),"fi"));

  if(filtered.length === 0){
    songsDiv.innerHTML = '<div class="notice">Ei hakutuloksia.</div>';
    return;
  }

  filtered.forEach(item => {
    const button = document.createElement("button");
    button.type = "button";
    button.className = "song-card";
    button.innerHTML = `
      <div class="song-title">${escapeHtml(item.song)}</div>
      <div class="song-artist">${escapeHtml(item.artist)}</div>
    `;

    button.addEventListener("click",() => {
      savedScrollPosition = songsDiv.scrollTop;
      selectedSong = item;
      document.getElementById("selectedSong").innerHTML = `
        <strong>Valittu biisi</strong>
        ${escapeHtml(item.song)}<br>
        <span style="color:var(--muted);">${escapeHtml(item.artist)}</span>
      `;
      openScreen("requestScreen");
    });

    songsDiv.appendChild(button);
  });
}

function getCooldownSecondsLeft(){
  const lastRequest = Number(localStorage.getItem("lastRequest") || 0);
  if(!lastRequest){
    return 0;
  }

  const secondsPassed = (Date.now() - lastRequest) / 1000;
  return Math.max(0, Math.ceil(COOLDOWN_SECONDS - secondsPassed));
}

function requireCooldown(label){
  const secondsLeft = getCooldownSecondsLeft();
  if(secondsLeft > 0){
    alert(`Odota ${secondsLeft} sekuntia ennen uutta ${label}.`);
    return false;
  }
  return true;
}

async function postToAppsScript(payload){
  const body = JSON.stringify(payload);

  if(!API_USES_READABLE_JSON){
    await fetch(WEBHOOK_URL, {
      method:"POST",
      mode:"no-cors",
      body
    });

    return { success:true, opaque:true };
  }

  const response = await fetch(WEBHOOK_URL, {
    method:"POST",
    mode:"cors",
    headers:{
      "Content-Type":"text/plain;charset=utf-8"
    },
    body
  });

  const result = await response.json();

  if(!result.success){
    throw new Error(result.error || "Lähetys epäonnistui.");
  }

  return result;
}

async function runSubmit(button, loadingText, doneText, action){
  const originalText = button.innerText;
  button.disabled = true;
  button.innerText = loadingText;

  try{
    await action();
    localStorage.setItem("lastRequest", String(Date.now()));
    if(doneText){
      alert(doneText);
    }
    goHome();
  }catch(err){
    console.error(err);
    alert("Lähetys epäonnistui. Yritä hetken päästä uudelleen.");
  }finally{
    button.disabled = false;
    button.innerText = originalText;
  }
}

async function sendRequest(event){
  if(!requireCooldown("toivetta")){
    return;
  }

  if(!selectedSong){
    alert("Valitse kappale ensin.");
    return;
  }

  const name = document.getElementById("name").value.trim();
  const message = document.getElementById("message").value.trim();

  if(!name){
    alert("Kirjoita oma nimi.");
    return;
  }

  await runSubmit(event.target, "Lähetetään...", "", async () => {
    await postToAppsScript({
      name,
      artist:selectedSong.artist,
      song:selectedSong.song,
      message
    });

    document.getElementById("successBox").style.display = "block";
    await new Promise(resolve => setTimeout(resolve,1400));
    document.getElementById("successBox").style.display = "none";
  });
}

async function sendSuggestion(event){
  if(!requireCooldown("ehdotusta")){
    return;
  }

  const artist = document.getElementById("suggestArtist").value.trim();
  const song = document.getElementById("suggestSong").value.trim();
  const message = document.getElementById("suggestMessage").value.trim();

  if(!artist || !song){
    alert("Täytä artisti ja kappale.");
    return;
  }

  await runSubmit(event.target, "Lähetetään...", "Biisiehdotus lähetetty!", async () => {
    await postToAppsScript({
      action:"suggestion",
      artist,
      song,
      message
    });
  });
}

async function sendDJMessage(event){
  if(!requireCooldown("viestiä")){
    return;
  }

  const name = document.getElementById("djMessageName").value.trim();
  const message = document.getElementById("djMessageText").value.trim();

  if(!message){
    alert("Kirjoita viesti.");
    return;
  }

  await runSubmit(event.target, "Lähetetään...", "Viesti lähetetty DJ:lle.", async () => {
    await postToAppsScript({
      action:"djmessage",
      name,
      message
    });
  });
}

async function loadPin(){
  try{
    const response = await fetch(PIN_CSV_URL);
    const text = await response.text();
    currentPin = (text.split("\n")[0] || "").replace(/"/g,"").trim();

    if(localStorage.getItem("eventPin") === currentPin){
      document.getElementById("pinScreen").style.display = "none";
    }
  }catch(err){
    console.error(err);
  }
}

function checkPin(){
  const enteredPin = document.getElementById("pinInput").value.trim();

  if(enteredPin && enteredPin.toUpperCase() === currentPin.toUpperCase()){
    localStorage.setItem("eventPin", currentPin);
    document.getElementById("pinScreen").style.display = "none";
    return;
  }

  alert("Väärä bilekoodi.");
}

async function loadMessageToggle(){
  try{
    const response = await fetch(MESSAGE_SETTINGS_URL);
    const text = await response.text();
    const cols = (text.split("\n")[0] || "").split(",");
    const value = (cols[1] || "ON").replace(/"/g,"").replace(/\r/g,"").trim().toUpperCase();
    const messageButton = document.getElementById("messageScreenButton");

    if(messageButton){
      messageButton.style.display = value === "ON" ? "block" : "none";
    }
  }catch(err){
    console.error(err);
  }
}

searchInput.addEventListener("input", event => {
  renderSongs(event.target.value);
});

loadPin();
loadMessageToggle();
renderSongs();

setInterval(loadMessageToggle,60000);
</script>
</body>
</html>
