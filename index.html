<!DOCTYPE html>
<html lang="fi">
<head>

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Summer Club Karaoke Lista</title>

<style>

body{
 
  background:
    linear-gradient(
      rgba(0,0,0,0.65),
      rgba(0,0,0,0.75)
    ),

    url("https://images.unsplash.com/photo-1507525428034-b723cf961d3e?q=80&w=1920&auto=format&fit=crop");

  background-size:cover;
  background-position:center;
  background-attachment:fixed;

  color:white;
  font-family:Arial, sans-serif;
  margin:0;
  padding:20px;
}

.container{
  max-width:800px;
  margin:auto;
}

h1{
  font-size:42px;
  margin-bottom:10px;
}

.subtitle{
  color:#aaa;
  margin-bottom:25px;
}

input,
textarea{
  width:100%;
  padding:15px;
  border:none;
  border-radius:12px;
  background:#1e1e1e;
  color:white;
  margin-top:10px;
  box-sizing:border-box;
  font-size:16px;
}

textarea{
  min-height:120px;
  resize:vertical;
}

button{
  width:100%;
  padding:18px;
  margin-top:20px;
  border:none;
  border-radius:12px;
  background:#ff0088;
  color:white;
  font-size:18px;
  font-weight:bold;
  cursor:pointer;
  transition:0.2s;
}

button:hover{
  transform:scale(1.01);
  background:#ff1493;
}

#songs{
  margin-top:20px;
  max-height:500px;
  overflow-y:auto;
  padding-right:5px;
}

.song{
  background:#1b1b1b;
  padding:16px;
  border-radius:14px;
  margin-bottom:10px;
  cursor:pointer;
  transition:0.2s;
  border:2px solid transparent;
}

.song:hover{
  background:#252525;
}

.song.selected{
  border:2px solid #ff0088;
  background:#2a1a24;
}

.song-title{
  font-size:18px;
  font-weight:bold;
}

.song-artist{
  color:#999;
  margin-top:5px;
}

#selectedSong{
  margin-top:20px;
  padding:16px;
  background:#1b1b1b;
  border-radius:14px;
  display:none;
}

.success{
  margin-top:20px;
  background:#16351f;
  color:#7dff9c;
  padding:15px;
  border-radius:12px;
  display:none;
}

.footer{
  margin-top:40px;
  color:#666;
  font-size:14px;
  text-align:center;
}

</style>

</head>

<body>

<div class="container">

<h1>🎤 Summer Club Karaoke Lista</h1>

<div class="subtitle">
Hae kappale tai artisti ja lähetä biisitoive DJ:lle 🔥
</div>

<input
  type="text"
  id="search"
  placeholder="Hae artistia tai kappaletta..."
/>

<div id="selectedSong"></div>

<div id="songs"></div>

<h2>🙋 Oma nimi</h2>

<input
  type="text"
  id="name"
  placeholder="Kirjoita nimesi..."
/>

<h2>📣 Terveiset DJ:lle</h2>

<textarea
  id="message"
  placeholder="Shoutoutit, synttärit, terveiset..."
></textarea>

<button onclick="sendRequest()">
🎵 Lähetä biisitoive DJ:lle 🎵
</button>

 <button onclick="toggleSuggestionBox()" class="suggest-btn">
➕ Ehdota uutta bilekaraokebiisiä
</button>

<div id="suggestionBox" style="display:none; margin-top:20px;">

  <input
    type="text"
    id="suggestArtist"
    placeholder="Artisti"
  />

  <input
    type="text"
    id="suggestSong"
    placeholder="Kappale"
  />

  <textarea
    id="suggestMessage"
    placeholder="Miksi tämä pitäisi lisätä? 😄"
  ></textarea>

  <button onclick="sendSuggestion()">
    🔥 Lähetä ehdotus
  </button>

</div>

<div class="success" id="successBox">
🔥 Biisitoive DJ:lle lähetetty 🔥
</div>

<div class="footer">
Summer Club Karaoke Kappaleet, ei nyyhkylauluja vaan iloisempaa menoa ❤️
</div>

</div>

<script src="songs.js"></script>

<script>

const WEBHOOK_URL =
"https://script.google.com/macros/s/AKfycbwMNRhRnPH7M7ca4_nruQg4pYpekx_j0MlpAKJ-jgjhoOEtxCg8ar4xkLJ4A1c2rB4zaQ/exec";
  

const songsDiv = document.getElementById("songs");
const searchInput = document.getElementById("search");

let selectedSong = null;

searchInput.addEventListener("input", e => {

  renderSongs(e.target.value);

});


function renderSongs(filter=""){

  songsDiv.innerHTML = "";

  const filtered = songs
    .filter(item =>

      item.artist
        .toLowerCase()
        .includes(filter.toLowerCase())

      ||

      item.song
        .toLowerCase()
        .includes(filter.toLowerCase())
    )

    .sort((a,b)=>
      a.artist.localeCompare(b.artist)
    );

  if(filtered.length === 0){

    songsDiv.innerHTML = `
      <div class="song">
        Ei hakutuloksia 😢
      </div>
    `;

    return;
  }

  filtered.forEach(item => {

    const div = document.createElement("div");

    div.className = "song";

    div.innerHTML = `
      <div class="song-title">
        ${item.song}
      </div>

      <div class="song-artist">
        ${item.artist}
      </div>
    `;

    div.onclick = () => {

      selectedSong = item;

      document
        .querySelectorAll(".song")
        .forEach(el =>
          el.classList.remove("selected")
        );

      div.classList.add("selected");

      document
        .getElementById("selectedSong")
        .style.display = "block";

      document
        .getElementById("selectedSong")
        .innerHTML = `
          <strong>🎵 Valittu biisi:</strong><br><br>
          ${item.song}<br>
          <span style="color:#999;">
            ${item.artist}
          </span>
        `;

      window.scrollTo({
        top:0,
        behavior:"smooth"
      });
    };

    songsDiv.appendChild(div);

  });
}



async function sendRequest(){

 const lastRequest =
  localStorage.getItem("lastRequest");

if(lastRequest){

  const secondsPassed =
    (Date.now() - Number(lastRequest)) / 1000;

  if(secondsPassed < 30){

    alert(
      `⏳ Odota ${Math.ceil(30 - secondsPassed)} sekuntia ennen uutta toivetta`
    );

    return;
  }
}
  if(!selectedSong){

    alert("Valitse kappale 🎵");
    return;
  }

  const name =
    document.getElementById("name").value;

  if(name.trim() === ""){

    alert("Kirjoita oma nimi 🙋");
    return;
  }

  const payload = {

    name:name,

    artist:selectedSong.artist,

    song:selectedSong.song,

    message:
      document.getElementById("message").value

  };

  const button = document.querySelector("button");

    button.disabled = true;

    button.innerText = "Lähetetään...";

   try{

  await fetch(WEBHOOK_URL, {

    method:"POST",

    mode:"no-cors",

    body:JSON.stringify(payload)

});

localStorage.setItem(
  "lastRequest",
  Date.now()
);

    document
      .getElementById("successBox")
      .style.display = "block";

    document
      .getElementById("name")
      .value = "";

    document
      .getElementById("message")
      .value = "";

    document
      .getElementById("search")
      .value = "";

    document
      .getElementById("selectedSong")
      .style.display = "none";

    document
      .querySelectorAll(".song")
      .forEach(el =>
        el.classList.remove("selected")
      );

    selectedSong = null;

    renderSongs("");

    songsDiv.scrollTop = 0;

    window.scrollTo({
      top:0,
      behavior:"smooth"
    });

    setTimeout(()=>{

      button.disabled = false;

      button.innerText = "Lähetä biisitoive";

      document
        .getElementById("successBox")
        .style.display = "none";

    },3000);

  }catch(err){

    console.log(err);

    alert("Yhteysvirhe 😢");

    button.disabled = false;

    button.innerText = "Lähetä biisitoive";
  }
}

function toggleSuggestionBox(){

  const box =
    document.getElementById("suggestionBox");

  if(box.style.display === "none"){

    box.style.display = "block";

  }else{

    box.style.display = "none";
  }
}

async function sendSuggestion(){

  const lastRequest =
  localStorage.getItem("lastRequest");

if(lastRequest){

  const secondsPassed =
    (Date.now() - Number(lastRequest)) / 1000;

  if(secondsPassed < 30){

    alert(
      `⏳ Odota ${Math.ceil(30 - secondsPassed)} sekuntia ennen uutta toivetta`
    );

    return;
  }
}

  const artist =
    document.getElementById("suggestArtist").value;

  const song =
    document.getElementById("suggestSong").value;

  const message =
    document.getElementById("suggestMessage").value;

  if(artist.trim() === "" || song.trim() === ""){

    alert("Täytä artisti ja kappale 🎵");

    return;
  }

  try{

    await fetch(WEBHOOK_URL, {

  method:"POST",

  mode:"no-cors",

  body:JSON.stringify({

    action:"suggestion",

    artist:artist,

    song:song,

    message:message

  })

});

localStorage.setItem(
  "lastRequest",
  Date.now()
);

    alert("🔥 Biisiehdotus lähetetty!");

    document.getElementById("suggestArtist").value = "";
    document.getElementById("suggestSong").value = "";
    document.getElementById("suggestMessage").value = "";

    document.getElementById("suggestionBox").style.display = "none";

  }catch(err){

    console.log(err);

    alert("❌ Lähetys epäonnistui");
  }
} 
  
renderSongs();
    
  
</script>

</body>
</html>
