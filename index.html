<!DOCTYPE html>

<html lang="fi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Summer Club Karaoke V3</title>

<style>

html,
body{
  overflow-x:hidden;
}
  
body{
  background:
    linear-gradient(
      rgba(0,0,0,0.65),
      rgba(0,0,0,0.75)
    ),
    url("https://images.unsplash.com/photo-1507525428034-b723cf961d3e?q=80&w=1920&auto=format&fit=crop");

  background-size:cover;
  background-position:center;
  background-attachment:fixed;

  color:white;
  font-family:Arial,sans-serif;
  margin:0;
  padding:20px;
}

.container{
  max-width:800px;
  margin:auto;
}

h1{
  font-size:42px;
  margin-bottom:10px;
}

.subtitle{
  color:#aaa;
  margin-bottom:25px;

  overflow:hidden;
  white-space:nowrap;
  box-sizing:border-box;
}

.subtitle span{
  display:inline-block;
  padding-left:100%;
  animation:marquee 14s linear infinite;
}

@keyframes marquee{

  0%{
    transform:translateX(0);
  }

  100%{
    transform:translateX(-100%);
  }
}

input,
textarea{
  width:100%;
  padding:15px;
  border:none;
  border-radius:12px;
  background:#1e1e1e;
  color:white;
  margin-top:10px;
  box-sizing:border-box;
  font-size:16px;
}

textarea{
  min-height:120px;
  resize:vertical;
}

button{
  width:100%;
  padding:18px;
  margin-top:20px;
  border:none;
  border-radius:12px;
  background:#ff0088;
  color:white;
  font-size:18px;
  font-weight:bold;
  cursor:pointer;
  transition:0.2s;
}

button:hover{
  background:#ff1493;
}

.screen{
  display:none;
}

.screen.active{
  display:block;
}

.back-btn{
  background:#272727;
}

#songs{
  margin-top:20px;
  max-height:65vh;
  overflow-y:auto;
  padding-right:5px;

  scrollbar-width:none;
  -ms-overflow-style:none;
}

#songs::-webkit-scrollbar{
  display:none;
}

.song{
  background:#1b1b1b;
  padding:16px;
  border-radius:14px;
  margin-bottom:10px;
  cursor:pointer;
  border:2px solid transparent;
}

.song:hover{
  background:#252525;
}

.song-title{
  font-size:18px;
  font-weight:bold;
}

.song-artist{
  color:#999;
  margin-top:5px;
}

.selected-song{
  margin-top:20px;
  background:#1b1b1b;
  border-radius:14px;
  padding:16px;
}

.success{
  margin-top:20px;
  background:#16351f;
  color:#7dff9c;
  padding:15px;
  border-radius:12px;
  display:none;
}

.footer{
  margin-top:40px;
  color:#777;
  text-align:center;
}

#pinScreen{
  position:fixed;
  inset:0;
  background:#0f0f0f;
  z-index:9999;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  padding:20px;
}

</style>

</head>
<body>

<div id="pinScreen">

  <h1>🎟️ Syötä tämän illan bilekoodi</h1>

<input
 type="text"
 id="pinInput"
 placeholder="Esim. CLUB42"
 style="max-width:300px;text-align:center;font-size:22px;"
/>

  <button onclick="checkPin()" style="max-width:300px;">
    🔓 Avaa bilekaraoke
  </button>

</div>

<div class="container">

  <!-- HOME -->

  <div id="homeScreen" class="screen active">


<h1>🎤 Summer Club Karaoke</h1>

<div class="subtitle">
  <span>
    🔥❤️ Ihanaa kun klikkasit itsesi tänne, valitse alta mitä haluat tehdä 😄🔥
  </span>
</div>
<button onclick="openScreen('songScreen')">
  🎵 Lisää Toiveesi Jonoon
</button>

<button onclick="openScreen('suggestionScreen')">
  ➕ Ehdota Puuttuvaa Bilekappaletta Listoille
</button>

<button onclick="openScreen('messageScreen')">
  💬 Lähetä DJ:lle DM
</button>


  </div>

  <!-- SONG SEARCH -->

  <div id="songScreen" class="screen">


<button class="back-btn" onclick="goHome()">
  ← Takaisin
</button>

<h1>🎵 Bile Karaoke Lista</h1>

<input
  type="text"
  id="search"
  placeholder="Hae artistia tai kappaletta..."
/>

<div id="songs"></div>


  </div>

  <!-- REQUEST -->

  <div id="requestScreen" class="screen">


<button class="back-btn" onclick="backToSongs()">
  ← Vaihda biisi
</button>

<div id="selectedSong" class="selected-song"></div>

<h2>🙋 Oma nimi</h2>

<input
  type="text"
  id="name"
  placeholder="Kirjoita nimesi..."
/>

<h2>📣 Terveiset DJ:lle</h2>

<textarea
  id="message"
  placeholder="Shoutoutit, synttärit, terveiset..."
></textarea>

<button onclick="sendRequest(event)">
  🎵 Lähetä biisitoive DJ:lle 🎵
</button>

<div class="success" id="successBox">
  🔥 Biisitoive lähetetty!
</div>


  </div>

  <!-- SUGGESTION -->

  <div id="suggestionScreen" class="screen">


<button class="back-btn" onclick="goHome()">
  ← Takaisin
</button>

<h1>➕ Ehdota biisiä</h1>

<input
  type="text"
  id="suggestArtist"
  placeholder="Artisti"
/>

<input
  type="text"
  id="suggestSong"
  placeholder="Kappale"
/>

<textarea
  id="suggestMessage"
  placeholder="Miksi tämä pitäisi lisätä? 😄"
></textarea>

<button onclick="sendSuggestion(event)">
  🔥 Lähetä ehdotus
</button>


  </div>

  <!-- DJ MESSAGE -->

  <div id="messageScreen" class="screen">


<button class="back-btn" onclick="goHome()">
  ← Takaisin
</button>

<h1>💬 Lähetä DJ:lle viesti</h1>

<input
  type="text"
  id="djMessageName"
  placeholder="Nimi (optional)"
/>

<textarea
  id="djMessageText"
  placeholder="Kirjoita viesti DJ:lle 😄"
></textarea>

<button onclick="sendDJMessage(event)">
  📣 Lähetä viesti
</button>


  </div>

  <div class="footer">
    BileKaraoke • Lex Willer 🔥
  </div>

</div>

<script src="songs.js"></script>

<script>

const WEBHOOK_URL =
"https://script.google.com/macros/s/AKfycbwMNRhRnPH7M7ca4_nruQg4pYpekx_j0MlpAKJ-jgjhoOEtxCg8ar4xkLJ4A1c2rB4zaQ/exec";

const PIN_CSV_URL =
"https://docs.google.com/spreadsheets/d/1ShQaz600hsbEMrDqYThFln7rs34lu4LlnEUH4C3Q6t4/export?format=csv&gid=1989187739";

const songsDiv = document.getElementById("songs");
const searchInput = document.getElementById("search");

let selectedSong = null;
let currentPin = "";
let savedScrollPosition = 0;

function hideAllScreens(){

  document
    .querySelectorAll('.screen')
    .forEach(screen=>{
      screen.classList.remove('active');
    });
}

function openScreen(screenId){

  hideAllScreens();

  document
    .getElementById(screenId)
    .classList.add('active');
}

function goHome(){

  hideAllScreens();

  document
    .getElementById('homeScreen')
    .classList.add('active');
}

function backToSongs(){

  openScreen('songScreen');

  setTimeout(()=>{

    songsDiv.scrollTop = savedScrollPosition;

  },50);
}

searchInput.addEventListener("input", e => {

  renderSongs(e.target.value);

});

function renderSongs(filter=""){

  songsDiv.innerHTML = "";

  const filtered = songs
    .filter(item =>
      item.artist.toLowerCase().includes(filter.toLowerCase()) ||
      item.song.toLowerCase().includes(filter.toLowerCase())
    )
    .sort((a,b)=>
      a.artist.localeCompare(b.artist)
    );

  if(filtered.length === 0){

    songsDiv.innerHTML = `
      <div class="song">
        Ei hakutuloksia 😢
      </div>
    `;

    return;
  }

  filtered.forEach(item => {

    const div = document.createElement("div");

    div.className = "song";

    div.innerHTML = `
      <div class="song-title">${item.song}</div>
      <div class="song-artist">${item.artist}</div>
    `;

    div.onclick = () => {

      savedScrollPosition = songsDiv.scrollTop;

      selectedSong = item;

      document
        .getElementById("selectedSong")
        .innerHTML = `
          <strong>🎵 Valittu biisi:</strong><br><br>
          ${item.song}<br>
          <span style="color:#999;">
            ${item.artist}
          </span>
        `;

      openScreen('requestScreen');

      window.scrollTo({
        top:0,
        behavior:"smooth"
      });
    };

    songsDiv.appendChild(div);
  });
}

async function sendRequest(event){

  const lastRequest =
    localStorage.getItem("lastRequest");

  if(lastRequest){

    const secondsPassed =
      (Date.now() - Number(lastRequest)) / 1000;

    if(secondsPassed < 30){

      alert(
        `⏳ Odota ${Math.ceil(30 - secondsPassed)} sekuntia ennen uutta toivetta`
      );

      return;
    }
  }

  if(!selectedSong){

    alert("Valitse kappale 🎵");

    return;
  }

  if(
    document
      .getElementById("name")
      .value
      .trim() === ""
  ){

    alert("Kirjoita oma nimi 🙋");

    return;
  }

  const payload = {

    name:
      document.getElementById("name").value,

    artist:selectedSong.artist,

    song:selectedSong.song,

    message:
      document.getElementById("message").value
  };

  const button = event.target;

  button.disabled = true;
  button.style.opacity = "0.5";
  button.innerText = "Lähetetään...";

  try{

    await fetch(WEBHOOK_URL, {

      method:"POST",

      mode:"no-cors",

      body:JSON.stringify(payload)

    });

    localStorage.setItem(
      "lastRequest",
      Date.now()
    );

    document
      .getElementById("successBox")
      .style.display = "block";

    document.getElementById("name").value = "";
    document.getElementById("message").value = "";
    document.getElementById("search").value = "";

    renderSongs("");

    setTimeout(()=>{

      document
        .getElementById("successBox")
        .style.display = "none";

      button.disabled = false;
      button.style.opacity = "1";
      button.innerText = "🎵 Lähetä biisitoive DJ:lle 🎵";

      goHome();

    },2000);

  }catch(err){

    console.log(err);

    alert("❌ Lähetys epäonnistui");

    button.disabled = false;
    button.style.opacity = "1";
    button.innerText = "🎵 Lähetä biisitoive DJ:lle 🎵";
  }
}

async function sendSuggestion(event){

  const lastRequest =
    localStorage.getItem("lastRequest");

  if(lastRequest){

    const secondsPassed =
      (Date.now() - Number(lastRequest)) / 1000;

    if(secondsPassed < 30){

      alert(
        `⏳ Odota ${Math.ceil(30 - secondsPassed)} sekuntia ennen uutta ehdotusta`
      );

      return;
    }
  }

  if(
    document
      .getElementById("suggestArtist")
      .value
      .trim() === "" ||

    document
      .getElementById("suggestSong")
      .value
      .trim() === ""
  ){

    alert("Täytä artisti ja kappale 🎵");

    return;
  }

  const button = event.target;

  button.disabled = true;
  button.style.opacity = "0.5";
  button.innerText = "Lähetetään...";

  try{

    await fetch(WEBHOOK_URL, {

      method:"POST",

      mode:"no-cors",

      body:JSON.stringify({

        action:"suggestion",

        artist:
          document.getElementById("suggestArtist").value,

        song:
          document.getElementById("suggestSong").value,

        message:
          document.getElementById("suggestMessage").value

      })

    });

    localStorage.setItem(
      "lastRequest",
      Date.now()
    );

    alert("🔥 Biisiehdotus lähetetty!");

    document.getElementById("suggestArtist").value = "";
    document.getElementById("suggestSong").value = "";
    document.getElementById("suggestMessage").value = "";

    button.disabled = false;
    button.style.opacity = "1";
    button.innerText = "🔥 Lähetä ehdotus";

    goHome();

  }catch(err){

    console.log(err);

    alert("❌ Lähetys epäonnistui");

    button.disabled = false;
    button.style.opacity = "1";
    button.innerText = "🔥 Lähetä ehdotus";
  }
}

async function sendDJMessage(event){

  const lastRequest =
    localStorage.getItem("lastRequest");

  if(lastRequest){

    const secondsPassed =
      (Date.now() - Number(lastRequest)) / 1000;

    if(secondsPassed < 30){

      alert(
        `⏳ Odota ${Math.ceil(30 - secondsPassed)} sekuntia ennen uutta viestiä`
      );

      return;
    }
  }

  if(
    document
      .getElementById("djMessageText")
      .value
      .trim() === ""
  ){

    alert("Kirjoita viesti 😄");

    return;
  }

  const button = event.target;

  button.disabled = true;
  button.style.opacity = "0.5";
  button.innerText = "Lähetetään...";

  try{

    await fetch(WEBHOOK_URL, {

      method:"POST",

      mode:"no-cors",

      body:JSON.stringify({

        action:"djmessage",

        name:
          document.getElementById("djMessageName").value,

        message:
          document.getElementById("djMessageText").value

      })

    });

    localStorage.setItem(
      "lastRequest",
      Date.now()
    );

    alert("📣 Viesti lähetetty DJ:lle");

    document.getElementById("djMessageName").value = "";
    document.getElementById("djMessageText").value = "";

    button.disabled = false;
    button.style.opacity = "1";
    button.innerText = "📣 Lähetä viesti";

    goHome();

  }catch(err){

    console.log(err);

    alert("❌ Lähetys epäonnistui");

    button.disabled = false;
    button.style.opacity = "1";
    button.innerText = "📣 Lähetä viesti";
  }
}

async function loadPin(){

  const response =
    await fetch(PIN_CSV_URL);

  const text =
    await response.text();

  const rows =
    text.split("\n");

  if(rows[0]){

    currentPin =
      rows[0]
        .replace(/\"/g,"")
        .trim();
  }

  const savedPin =
    localStorage.getItem("eventPin");

  if(savedPin === currentPin){

    document
      .getElementById("pinScreen")
      .style.display = "none";
  }
}

function checkPin(){

  const enteredPin =
    document
      .getElementById("pinInput")
      .value
      .trim();

  if(
    enteredPin.toUpperCase() ===
    currentPin.toUpperCase()
  ){

    localStorage.setItem(
      "eventPin",
      currentPin
    );

    document
      .getElementById("pinScreen")
      .style.display = "none";

  }else{

    alert("❌ Väärä bilekoodi");
  }
}

loadPin();
renderSongs();

</script>

</body>
</html>
